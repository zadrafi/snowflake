name: AI Extract POC Tests

on:
  push:
    branches: [main]
    paths:
      - 'poc/**'
  pull_request:
    branches: [main]
    paths:
      - 'poc/**'
  workflow_dispatch:
    inputs:
      clouds:
        description: 'Clouds to test (comma-separated: aws,azure,gcp)'
        required: false
        default: 'aws,azure,gcp'

env:
  PYTHON_VERSION: '3.11'
  POC_DB: AI_EXTRACT_POC
  POC_SCHEMA: DOCUMENTS
  POC_WH: AI_EXTRACT_WH
  POC_ROLE: AI_EXTRACT_APP

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — no Snowflake connection required
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poc
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: |
          uv run pytest \
            tests/test_normalize_unit.py \
            tests/test_review_helpers.py \
            tests/test_config_helpers.py \
            tests/test_admin_builder.py \
            -v

      - name: Lint — compile check
        run: |
          uv run python -m py_compile streamlit/streamlit_app.py
          uv run python -m py_compile streamlit/config.py
          for f in streamlit/pages/*.py; do
            uv run python -m py_compile "$f"
          done

  # -----------------------------------------------------------------------
  # SQL integration tests — matrix across AWS, Azure, GCP
  # -----------------------------------------------------------------------
  sql-tests:
    name: SQL Tests (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
        include:
          - cloud: aws
            account_secret: SNOWFLAKE_ACCOUNT_AWS
          - cloud: azure
            account_secret: SNOWFLAKE_ACCOUNT_AZURE
          - cloud: gcp
            account_secret: SNOWFLAKE_ACCOUNT_GCP
    defaults:
      run:
        working-directory: poc
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets[matrix.account_secret] }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      POC_CONNECTION: ci
    steps:
      - uses: actions/checkout@v4

      - name: Check Snowflake secrets are configured
        id: check_secrets
        run: |
          if [ -z "$SNOWFLAKE_ACCOUNT" ] || [ -z "$SNOWFLAKE_USER" ] || [ -z "$SNOWFLAKE_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Snowflake secrets not configured for ${{ matrix.cloud }} — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.check_secrets.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: uv sync --all-groups

      - name: Configure Snowflake connection
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml <<EOF
          [ci]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          database = "${POC_DB}"
          schema = "${POC_SCHEMA}"
          warehouse = "${POC_WH}"
          role = "${POC_ROLE}"
          EOF
          chmod 0600 ~/.snowflake/connections.toml

      - name: Run SQL integration tests
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_e2e \
            --timeout=120 \
            -v --tb=short \
            --junitxml=test-results-${{ matrix.cloud }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.check_secrets.outputs.skip != 'true'
        with:
          name: test-results-${{ matrix.cloud }}
          path: poc/test-results-${{ matrix.cloud }}.xml

  # -----------------------------------------------------------------------
  # E2E browser tests — matrix across AWS, Azure, GCP
  # -----------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
        include:
          - cloud: aws
            account_secret: SNOWFLAKE_ACCOUNT_AWS
          - cloud: azure
            account_secret: SNOWFLAKE_ACCOUNT_AZURE
          - cloud: gcp
            account_secret: SNOWFLAKE_ACCOUNT_GCP
    defaults:
      run:
        working-directory: poc
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets[matrix.account_secret] }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      POC_CONNECTION: ci
    steps:
      - uses: actions/checkout@v4

      - name: Check Snowflake secrets are configured
        id: check_secrets
        run: |
          if [ -z "$SNOWFLAKE_ACCOUNT" ] || [ -z "$SNOWFLAKE_USER" ] || [ -z "$SNOWFLAKE_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Snowflake secrets not configured for ${{ matrix.cloud }} — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.check_secrets.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: uv sync --all-groups

      - name: Install Playwright browsers
        if: steps.check_secrets.outputs.skip != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Configure Snowflake connection
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml <<EOF
          [ci]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          database = "${POC_DB}"
          schema = "${POC_SCHEMA}"
          warehouse = "${POC_WH}"
          role = "${POC_ROLE}"
          EOF
          chmod 0600 ~/.snowflake/connections.toml

      - name: Configure Streamlit secrets
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          mkdir -p streamlit/.streamlit
          cat > streamlit/.streamlit/secrets.toml <<EOF
          [connections.snowflake]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          warehouse = "${POC_WH}"
          database = "${POC_DB}"
          schema = "${POC_SCHEMA}"
          role = "${POC_ROLE}"
          EOF
          chmod 0600 streamlit/.streamlit/secrets.toml

      - name: Start Streamlit server
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          POC_CONNECTION=ci POC_DB="${POC_DB}" POC_SCHEMA="${POC_SCHEMA}" \
            POC_WH="${POC_WH}" POC_ROLE="${POC_ROLE}" \
            uv run streamlit run streamlit/streamlit_app.py \
              --server.port 8504 --server.headless true \
              --browser.gatherUsageStats false &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8504 | grep -q 200; then
              echo "Streamlit server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests (per-file for Playwright stability)
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          EXIT_CODE=0
          for test_file in \
            tests/test_e2e/test_poc_landing.py \
            tests/test_e2e/test_poc_dashboard.py \
            tests/test_e2e/test_poc_document_viewer.py \
            tests/test_e2e/test_poc_analytics.py \
            tests/test_e2e/test_poc_review.py \
            tests/test_e2e/test_poc_admin.py \
            tests/test_e2e/test_poc_multi_doc.py; do
            echo "--- Running $test_file ---"
            uv run pytest "$test_file" \
              --timeout=120 -v --tb=short \
              --junitxml="e2e-results-${{ matrix.cloud }}-$(basename $test_file .py).xml" || EXIT_CODE=1
          done
          exit $EXIT_CODE

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always() && steps.check_secrets.outputs.skip != 'true'
        with:
          name: e2e-results-${{ matrix.cloud }}
          path: poc/e2e-results-${{ matrix.cloud }}-*.xml

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure() && steps.check_secrets.outputs.skip != 'true'
        with:
          name: e2e-screenshots-${{ matrix.cloud }}
          path: poc/screenshots/
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Summary — aggregate cross-cloud results
  # -----------------------------------------------------------------------
  summary:
    name: Cross-Cloud Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, sql-tests, e2e-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Cross-Cloud Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Tests (aws) | ${{ needs.sql-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Tests (azure) | ${{ needs.sql-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Tests (gcp) | ${{ needs.sql-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (aws) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (azure) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (gcp) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
