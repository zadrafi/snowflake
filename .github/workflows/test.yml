name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  POC_CONNECTION: ci
  POC_DB: AI_EXTRACT_POC
  POC_SCHEMA: DOCUMENTS
  POC_WH: AI_EXTRACT_WH
  POC_ROLE: AI_EXTRACT_APP

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest snowflake-snowpark-python pypdfium2 Pillow reportlab
      - name: Run unit tests
        run: pytest -m "not sql and not e2e"

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest snowflake-connector-python snowflake-snowpark-python
      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          printf '%s' "${SNOWFLAKE_PRIVATE_KEY}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8
      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << EOF
          [ci]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          private_key_path = "/tmp/rsa_key.p8"
          role = "${POC_ROLE}"
          warehouse = "${POC_WH}"
          database = "${POC_DB}"
          schema = "${POC_SCHEMA}"
          EOF
          chmod 600 ~/.snowflake/connections.toml
      - name: Run integration tests
        run: pytest -m sql --tb=short
