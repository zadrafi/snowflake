# .github/workflows/test.yml
name: Test Suite
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  POC_CONNECTION: ci
  POC_DB: AI_EXTRACT_POC
  POC_SCHEMA: DOCUMENTS
  POC_WH: AI_EXTRACT_WH
  POC_ROLE: AI_EXTRACT_APP

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest snowflake-snowpark-python pypdfium2 Pillow reportlab
      - run: pytest  # runs only unit tests (default marker)

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests  # only run if unit tests pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest snowflake-connector-python snowflake-snowpark-python
      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << EOF
          [ci]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          private_key_path = "/tmp/rsa_key.p8"
          role = "AI_EXTRACT_APP"
          warehouse = "AI_EXTRACT_WH"
          database = "AI_EXTRACT_POC"
          schema = "DOCUMENTS"
          EOF
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8
      - run: pytest -m sql --tb=short
