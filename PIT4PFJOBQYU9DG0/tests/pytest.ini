[pytest]
testpaths = tests
python_files = test_*.py benchmark_*.py
python_classes = Test*
python_functions = test_*

markers =
    sql: Tests requiring a live Snowflake connection (deselect: -m "not sql")
    slow: Performance / load / stress tests (deselect: -m "not slow")
    e2e: End-to-end Playwright tests requiring a running Streamlit app (deselect: -m "not e2e")

# Default: run only local unit tests (no Snowflake, no Playwright)
addopts = -m "not sql and not e2e" --tb=short -q
